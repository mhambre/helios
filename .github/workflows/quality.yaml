name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  rust:
    name: Rust Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, rust-src
          targets: x86_64-unknown-linux-gnu

      - name: Set up .env
        run: |
          cp .env.example .env

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-quality

      - name: Check formatting
        run: just rust-fmt-check

      - name: Run clippy (deny warnings)
        run: just rust-clippy

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cargo_lock:
              - 'Cargo.lock'

      - name: Skip udeps (Cargo.lock unchanged)
        if: "${{ github.event_name != 'workflow_dispatch' && steps.filter.outputs.cargo_lock != 'true' }}"
        run: |
          echo "Skipping cargo-udeps: Cargo.lock did not change"

      - name: Install Rust (nightly)
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo + target
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        uses: Swatinem/rust-cache@v2
        with:
          key: udeps

      - name: Install cargo-udeps
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        run: cargo install cargo-udeps --locked

      - name: Set up .env
        run: |
          cp .env.example .env

      - name: Run cargo udeps
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        run: just rust-udeps

  shell:
    name: Shell Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run shellcheck
        run: just shell-check

      - name: Check shell formatting
        run: just shell-fmt-check
