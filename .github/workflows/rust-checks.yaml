name: Rust Quality Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Run clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  udeps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cargo_lock:
              - 'Cargo.lock'

      - name: Skip udeps (Cargo.lock unchanged)
        if: "${{ github.event_name != 'workflow_dispatch' && steps.filter.outputs.cargo_lock != 'true' }}"
        run: |
          echo "Skipping cargo-udeps: Cargo.lock did not change"

      - name: Install Rust (nightly)
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo + target
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        uses: Swatinem/rust-cache@v2
        with:
          key: udeps

      - name: Install cargo-udeps
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        run: cargo install cargo-udeps --locked

      - name: Run cargo udeps
        if: "${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cargo_lock == 'true' }}"
        run: cargo +nightly udeps --workspace --all-targets
